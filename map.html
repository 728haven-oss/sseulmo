*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:var(--txt);line-height:1.55}
.wrap{max-width:1000px;margin:0 auto;padding:24px 16px 80px}

.sec{font-size:15px;font-weight:800;margin:26px 2px 12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:10px}
.gu{display:flex;flex-direction:column;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;text-decoration:none;color:inherit;box-shadow:var(--shadow)}
.gu.on{border-color:#bfe3c9;background:#f1fbf5;transition:.12s}
.gu.on:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(21,163,74,.14)}
.gu.soon{opacity:.5}
.gu .n{font-size:16px;font-weight:800}
.gu .b{font-size:11px;font-weight:800;align-self:flex-start;padding:2px 8px;border-radius:999px}
.b-on{background:#e9f9ef;color:#0f7a37}.b-soon{background:#eef1f5;color:#8a96a5}
.foot{margin-top:28px;color:var(--sub);font-size:12px;text-align:center}
