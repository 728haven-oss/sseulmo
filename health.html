<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>전국 지금 여는 병원·약국·한의원</title>
<style>
  :root{
    --bg:#eef2f6; --card:#ffffff; --card2:#f5f8fb; --line:#e3e9f0;
    --txt:#1f2a37; --sub:#64748b; --accent:#15a34a; --accent2:#2563eb;
    --warn:#d97706; --closed:#94a3b8; --red:#dc2626; --pill:#eaf0f6;
    --big:#1d4ed8; --bigbg:#f3f8ff; --bigline:#cfe0fb;
    --shadow:0 1px 3px rgba(16,40,70,.06),0 1px 2px rgba(16,40,70,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",sans-serif;
       background:var(--bg);color:var(--txt);line-height:1.45;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased}
  header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
         border-bottom:1px solid var(--line);padding:12px 16px;box-shadow:var(--shadow)}
  .titlebar{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;max-width:920px;margin:0 auto}
  h1{font-size:17px;margin:0;display:flex;align-items:center;gap:7px;font-weight:800;letter-spacing:-.01em}
  .clock{font-variant-numeric:tabular-nums;font-size:12.5px;color:var(--sub);white-space:nowrap}
  .clock b{color:var(--txt);font-weight:700}
  .wrap{max-width:920px;margin:0 auto;padding:0 14px 90px}
  .setup{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin:14px 0;box-shadow:var(--shadow)}
  .setup summary{cursor:pointer;font-weight:700;font-size:14px;color:var(--txt)}
  .setup label{display:block;font-size:12px;color:var(--sub);margin:10px 0 4px}
  .setup input{width:100%;padding:11px 12px;background:#fbfcfe;border:1px solid var(--line);
               border-radius:10px;color:var(--txt);font-size:14px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .btn{appearance:none;border:1px solid var(--line);background:var(--card2);color:var(--txt);
       padding:10px 14px;border-radius:10px;font-size:14px;cursor:pointer;font-weight:700}
  .btn.primary{background:var(--accent2);border-color:var(--accent2);color:#fff}
  .btn:active{transform:translateY(1px)}
  .iconbtn{padding:5px 9px;font-size:14px;line-height:1;border-radius:8px}
  .lookup{background:var(--accent2);border-color:var(--accent2);color:#fff;padding:8px 18px;font-size:13.5px;border-radius:10px;font-weight:800}
  .tabs{display:flex;gap:7px;margin:14px 0 9px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;padding:9px 15px;border-radius:999px;background:var(--card);color:var(--sub);
       font-size:14px;cursor:pointer;border:1px solid var(--line);white-space:nowrap;font-weight:700}
  .tab.on{background:var(--txt);color:#fff;border-color:var(--txt)}
  .filters{display:flex;gap:7px;flex-wrap:wrap;margin:4px 0 10px}
  .chip{padding:8px 13px;border-radius:999px;background:var(--card);border:1px solid var(--line);
        color:var(--sub);font-size:13px;cursor:pointer;white-space:nowrap;font-weight:600}
  .chip.on{border-color:var(--accent);color:#0f7a37;background:#e9f9ef}
  .chip #nowt{font-weight:800;margin-left:2px}
  .datepick{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;
            background:var(--card);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--txt);cursor:pointer}
  .datepick span{color:var(--sub)}
  .datepick input[type=date]{border:none;background:none;font:inherit;color:var(--accent2);font-weight:800;padding:0;min-height:24px}
  .status-line{font-size:12.5px;color:var(--sub);margin:6px 2px 12px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .regionbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:14px 0 2px}
  .regionbar .rlabel{font-size:13px;color:var(--sub);font-weight:800;flex:0 0 auto}
  .regionbar select{flex:1 1 150px;min-width:120px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--txt);font-size:14px;font-weight:700}
  .rmode{font-size:11px;padding:4px 9px;border-radius:7px;font-weight:800;white-space:nowrap}
  .rmode.off{background:#e9f9ef;color:#0f7a37}
  .rmode.live{background:#eef4ff;color:#1e3a8a}
  @media (max-width:520px){
    header{padding:10px 12px} h1{font-size:15px} .clock{font-size:11px}
    .wrap{padding:0 10px 96px} .setup{padding:12px;margin:10px 0}
    .card{padding:13px;border-radius:13px} .c-name{font-size:15.5px} .card.big .c-name{font-size:16.5px}
    .tab{padding:9px 14px} .chip{padding:9px 13px;font-size:13.5px} .btn,.lookup{padding:11px 15px}
    .regionbar select{flex:1 1 44%} .status-line{gap:7px;font-size:12px} .datepick{flex:1 1 100%}
  }
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:11px;box-shadow:var(--shadow)}
  .card.big{border:1px solid var(--bigline);border-top:3px solid var(--big);background:var(--bigbg);box-shadow:0 2px 12px rgba(37,99,235,.09)}
  .c-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .c-name{font-size:16.5px;font-weight:800;margin:0;letter-spacing:-.01em}
  .card.big .c-name{font-size:18px}
  .badges{display:flex;gap:5px;flex-wrap:wrap;margin:7px 0}
  .badge{font-size:11px;padding:3px 9px;border-radius:7px;font-weight:800;white-space:nowrap}
  .b-big{background:var(--big);color:#fff}
  .b-type{background:#eef2f6;color:#475569}
  .b-open{background:#e9f9ef;color:#0f7a37}
  .b-closed{background:#eef1f4;color:#64748b}
  .b-night{background:#fdf2e3;color:#b45309}
  .b-er{background:#fdeaea;color:#c0271f}
  .dist{font-size:13px;color:var(--sub);white-space:nowrap;text-align:right}
  .dist b{color:var(--accent2);font-size:16px;font-weight:800}
  .meta{font-size:13px;color:var(--sub);margin:3px 0}
  .hours{font-size:13.5px;margin:9px 0 4px;color:var(--txt)}
  .hours .o{color:#0f7a37;font-weight:800}
  .hours .x{color:var(--closed);font-weight:700}
  /* 큰 병원: 전공·수술 아이콘 칩 */
  .specs{display:flex;gap:7px;flex-wrap:wrap;margin:11px 0 2px}
  .spec{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--bigline);
        color:#1e3a8a;font-size:12.5px;font-weight:700;padding:6px 10px;border-radius:10px;cursor:pointer;font-family:inherit}
  .spec.has{border-color:#1e3a8a}
  .spec.on{background:#1e3a8a;color:#fff;border-color:#1e3a8a}
  .spec .i{font-size:15px;line-height:1}
  .docbox:not(:empty){margin:9px 0 2px;padding:11px;background:#fbfcfe;border:1px solid var(--bigline);border-radius:10px}
  .awards{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .award{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:#92600a;
         background:#fff8ec;border:1px solid #f2dca8;border-radius:8px;padding:5px 9px}
  .award.asm{color:#1e3a8a;background:#eef4ff;border-color:#bcd5fb}
  /* 진료과목 칩 (대표 진료과는 초록으로 강조) */
  .deptbtn{margin-top:10px;font-size:12.5px;font-weight:700;color:var(--accent2);background:none;
           border:none;cursor:pointer;padding:4px 0;display:inline-flex;align-items:center;gap:4px}
  .dept-cap{font-size:11.5px;color:var(--sub);margin:9px 0 5px;font-weight:700}
  .dept-cap .k{color:#0f7a37}
  .depts{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
  .dept{font-size:12px;font-weight:600;color:#475569;background:#f1f5f9;
        border:1px solid var(--line);border-radius:8px;padding:5px 9px}
  .dept.rep{color:#0f7a37;background:#e9f9ef;border-color:#bfe9cd;font-weight:800}
  /* 대표 의료진 약력 (사진 제외) */
  .docwrap{margin-top:10px}
  .doc{font-size:12.5px;padding:7px 0;border-top:1px solid var(--line)}
  .doc:first-of-type{border-top:none}
  .doc b{color:var(--txt);font-weight:800}
  .doct{color:var(--accent2);font-weight:700;font-size:11.5px;margin-left:5px}
  .docf{color:var(--sub);font-size:12px;margin-top:2px}
  .docdet{margin-top:10px;border:1px solid var(--line);border-radius:10px;background:#fbfcfe;padding:2px 11px}
  .docdet summary{cursor:pointer;font-size:12.5px;font-weight:800;color:#1e3a8a;padding:8px 0}
  .docgrp{padding:2px 0 8px}
  .note{font-size:12.5px;color:#475569;background:#f6f8fb;border:1px solid var(--line);
        border-radius:10px;padding:9px 11px;margin-top:9px}
  .note b{color:#1e3a8a}
  .acts{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
  .acts a{flex:1 1 auto;text-align:center;text-decoration:none;font-size:13.5px;font-weight:700;
          padding:11px;border-radius:10px;border:1px solid var(--line);color:var(--txt);background:var(--card2);
          min-height:44px;display:flex;align-items:center;justify-content:center;gap:5px}
  .acts a.call{background:#e9f9ef;border-color:#bfe9cd;color:#0f7a37}
  .empty{text-align:center;color:var(--sub);padding:44px 14px;font-size:14px}
  .banner{background:#fff8ec;border:1px solid #f2dca8;border-left:4px solid var(--warn);
          border-radius:12px;padding:11px 13px;font-size:12.5px;color:#6b4d12;margin:10px 0}
  .banner b{color:#92600a}
  .loader{text-align:center;padding:36px;color:var(--sub)}
  .small{font-size:11.5px;color:var(--sub)}
  a.lnk{color:var(--accent2);font-weight:600}
  .hidden{display:none}
  .grp-h{font-size:12px;color:var(--sub);margin:18px 4px 9px;font-weight:800;letter-spacing:.04em}
  .src{margin-top:20px;padding:14px 4px 0;border-top:1px solid var(--line);font-size:11.5px;color:var(--sub);line-height:1.75}
  .src b{color:var(--txt)} .src a{color:var(--accent2)}
  @media (max-width:480px){
    h1{font-size:16px}
    .wrap{padding:0 11px 90px}
    .card{padding:14px}
    .clock{font-size:11.5px}
  }
</style>
</head>

<header>
  <div class="titlebar">
    <h1>🏥 양천구 지금 여는 곳</h1>
    <div class="clock" id="clock">—</div>
  </div>
</header>

<div class="wrap">

  <details class="setup" id="setupBox" open>
    <summary>⚙️ 설정 — 공공데이터 인증키 입력 (최초 1회)</summary>
    <label>data.go.kr 일반 인증키 (Decoding 키 권장)</label>
    <input id="apiKey" type="text" placeholder="발급받은 서비스키를 붙여넣으세요" autocomplete="off" value="" />
    <div class="row" style="margin-top:10px">
      <button class="btn primary" id="saveKey">저장하고 불러오기</button>
      <button class="btn" id="useLoc">📍 내 위치 사용</button>
    </div>
    <p class="small" style="margin:10px 0 0">
      키 발급: <a class="lnk" href="https://www.data.go.kr/data/15000736/openapi.do" target="_blank">전국 병·의원 찾기</a> ·
      <a class="lnk" href="https://www.data.go.kr/data/15000576/openapi.do" target="_blank">전국 약국 찾기</a>

      직접 열면 브라우저 보안(CORS)으로 막힐 수 있어요 — 동봉한 <b>proxy.py</b> 실행 후
      <b>http://localhost:8080</b> 으로 여는 것을 권장합니다(사용설명서 참고).
    </p>
  </details>

  <details class="setup">
    <summary>🩺 내 진료·처방 이력 조회 (공식 서비스 바로가기)</summary>
    <p class="small" style="margin:8px 0">진료·처방 이력은 본인 인증이 필요한 민감정보라 <b>이 앱에는 저장·입력되지 않습니다.</b> 아래 공식 서비스에서 본인 인증 후 안전하게 조회하세요.</p>
    <div class="row">
      <a class="btn" href="https://www.hira.or.kr/rb/dur/form.do?pgmid=HIRAA050300000100" target="_blank">💊 내가 먹는 약! 한눈에</a>
      <a class="btn" href="https://www.myhealthway.go.kr/" target="_blank">🗂️ 나의건강기록</a>
      <a class="btn" href="https://www.nhis.or.kr/" target="_blank">🏥 건강보험공단</a>
    </div>
  </details>

  <div class="regionbar">
    <span class="rlabel">📍 지역</span>
    <select id="sidoSel" aria-label="시도"></select>
    <select id="sgguSel" aria-label="시군구"></select>
    <span id="regionMode" class="rmode off">오프라인 내장</span>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab on" data-tab="all">전체</div>
    <div class="tab" data-tab="hosp">병원·의원</div>
    <div class="tab" data-tab="orient">한의원</div>
    <div class="tab" data-tab="pharm">약국</div>
  </div>

  <div class="filters" id="filters">
    <label class="datepick" for="dateInput">📅 <span>날짜</span><input type="date" id="dateInput" /></label>
    <div class="chip" data-f="night">🌙 야간(20시 이후)</div>
    <div class="chip on" data-f="big">🏥 큰 병원 먼저</div>
    <div class="chip" data-f="open">🟢 지금 영업중 <b id="nowt"></b></div>
  </div>

  <div class="status-line" id="statusLine"></div>

  <div id="dutyBanner" class="banner hidden">
    <b>💊 주말·공휴일 약국 안내</b> — 한국은 주말·공휴일에 문 여는 약국(당번약국)이 <b>매주 바뀝니다</b>.
    위 <b>📅 달력</b>에서 토·일·공휴일 날짜를 고르면 그날 운영하는 약국과 시간이 표시됩니다.
    변동이 잦으니 방문 전 전화 확인을 권장하며, 실시간 휴일지킴이약국은
    <a class="lnk" href="https://www.e-gen.or.kr/egen/search_pharmacy.do" target="_blank">응급의료포털(E-Gen)</a>에서도 확인할 수 있어요.
  </div>

  <div id="list"></div>

  <div class="src">
    <b>📑 데이터 출처</b><br>
    · 병원·의원·약국 목록, 운영시간, 응급실, 위치, 진료과목: 국립중앙의료원 <a href="https://www.e-gen.or.kr/" target="_blank">응급의료포털(E-Gen)</a> · <a href="https://www.data.go.kr/" target="_blank">공공데이터포털(data.go.kr)</a><br>
    · 병원 적정성평가 등급: <a href="https://www.hira.or.kr/ra/eval/getDiagEvlList.do?pgmid=HIRAA030004000100" target="_blank">건강보험심사평가원(심평원)</a><br>
    · 대표 의료진 약력: 각 병원 공식 홈페이지(예: 이대목동병원)<br>
    · 길찾기: 카카오맵 · 주말·공휴일 당번약국: <a href="https://www.pharm114.or.kr/" target="_blank">휴일지킴이약국</a><br>
    ※ 운영시간·의료진은 변동될 수 있어 방문 전 전화 확인을 권장합니다.
  </div>
</div>

const $ = s => document.querySelector(s);
function todayInfo(d=new Date()){
  // 한국시간 기준
  const kst = new Date(d.toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  const ymd = kst.toISOString? null : null;
  const y=kst.getFullYear(), m=String(kst.getMonth()+1).padStart(2,"0"), day=String(kst.getDate()).padStart(2,"0");
  const dateStr = `${y}-${m}-${day}`;
  const isHol = HOLIDAYS.has(dateStr);
  const dow = kst.getDay(); // 0=일..6=토
  // dutyTime index: 1=월..7=일,8=공휴일
  const dowIdx = (dow===0)?7:dow;
  const idx = isHol ? 8 : dowIdx;
  const mins = kst.getHours()*60 + kst.getMinutes();
  return { kst, dateStr, isHol, dow, idx, mins };
}
// 선택한 날짜(YYYY-MM-DD)의 요일·공휴일·운영시간 index
function dateInfo(dateStr){
  const [y,m,d]=dateStr.split("-").map(Number);
  const dt=new Date(y, m-1, d);
  const dow=dt.getDay();                 // 0=일..6=토
  const isHol=HOLIDAYS.has(dateStr);
  const dowIdx=(dow===0)?7:dow;          // dutyTime index: 1=월..7=일
  const idx=isHol?8:dowIdx;              // 8=공휴일
  return { y, m, d, dow, isHol, idx };
}
function fmtT(hhmm){
  if(!hhmm || hhmm.length<3) return null;
  const s = hhmm.padStart(4,"0");
  return s.slice(0,2)+":"+s.slice(2,4);
}
function toMin(hhmm){
  if(!hhmm) return null;
  const s = hhmm.padStart(4,"0");
  const h=+s.slice(0,2), mm=+s.slice(2,4);
  if(isNaN(h)||isNaN(mm)) return null;
  return h*60+mm;
}
function haversine(a,b){
  if(!b.lat||!b.lon) return Infinity;
  const R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lon-a.lon)*Math.PI/180;
  const la1=a.lat*Math.PI/180, la2=b.lat*Math.PI/180;
  const h=Math.sin(dLat/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function distLabel(km){
  if(!isFinite(km)) return "–";
  return km<1 ? Math.round(km*1000)+" m" : km.toFixed(1)+" km";
}

// 영업 판정: 특정 요일index의 운영시간과 현재 분으로 open 여부
function openState(item, idx, mins){
  const s = toMin((item.t||item)["dutyTime"+idx+"s"]);
  const c = toMin((item.t||item)["dutyTime"+idx+"c"]);
  if(s==null||c==null) return { has:false, open:false, s:null, c:null };
  let open;
  if(c>=s) open = (mins>=s && mins<c);
  else open = (mins>=s || mins<c); // 자정 넘김
  return { has:true, open, s, c };
}
function isNight(item, idx){
  const c = toMin((item.t||item)["dutyTime"+idx+"c"]);
  return c!=null && (c>=20*60 || c< 6*60); // 20시 이후 또는 새벽까지
}

function parseItems(xmlText){
  const doc = new DOMParser().parseFromString(xmlText, "text/xml");
  const err = doc.querySelector("parsererror");
  if(err) throw new Error("XML 파싱 실패");
  // 에러 메시지(인증키 등)
  const rh = doc.querySelector("resultMsg, returnAuthMsg, errMsg, cmmMsgHeader");
  const items = [...doc.querySelectorAll("item")];
  return items.map(it=>{
    const o={};
    [...it.children].forEach(ch=> o[ch.tagName]= (ch.textContent||"").trim());
    return o;
  });
}
async function fetchAll(url, extra=""){
  const key = $("#apiKey").value.trim();
  const q = `${key?("serviceKey="+encodeURIComponent(key)+"&"):""}Q0=${encodeURIComponent(SIDO)}&Q1=${encodeURIComponent(SGGU)}&pageNo=1&numOfRows=1000${extra}`;
  const full = apiRoot()+url+"?"+q;
  const res = await fetch(full);
  if(!res.ok) throw new Error("요청 실패 ("+res.status+")");
  const txt = await res.text();
  if(txt.includes("SERVICE_KEY_IS_NOT_REGISTERED") || txt.includes("SERVICE ERROR") || txt.includes("LIMITED_NUMBER")){
    throw new Error("인증키 오류 또는 트래픽 초과 — Decoding 키인지, 활용신청 승인됐는지 확인하세요");
  }
  return parseItems(txt);
}
function normalize(raw, kind){

}

function isRepDept(dept, hospName, sp){
  const base=dept.replace(/과$/,"");
  if(hospName && (hospName.includes(dept) || (base.length>=2 && hospName.includes(base)))) return true;

function deptChipsHtml(list, hospName, sp){

  const reps=[], others=[];
  list.forEach(d=> (isRepDept(d,hospName,sp)?reps:others).push(d));
  const ordered=[...reps,...others];
  const chips=ordered.map(d=>{const r=reps.includes(d);return `<span class="dept ${r?'rep':''}">${r?'⭐ ':''}${d}</span>`;}).join("");

}

function parseSnap(tsv){
  const H=[],P=[];
  (tsv||"").split("\n").forEach(line=>{
    if(!line) return;
    const c=line.split("\t"); if(c.length<9) return;
    const t={};
    c[8].split("|").forEach((seg,i)=>{ const p=seg.split("-"); if(p[0])t["dutyTime"+(i+1)+"s"]=p[0]; if(p[1])t["dutyTime"+(i+1)+"c"]=p[1]; });
    const o={ kind:(c[0]==="P")?"pharm":"hosp", name:c[1], addr:c[2]?("서울특별시 양천구 "+c[2]):"", tel:c[3], div:c[4], er:(c[5]==="1"), lat:+c[6]||null, lon:+c[7]||null, t };
    (c[0]==="P"?P:H).push(o);
  });
  return {H,P};
}

/* ===================== 렌더 ===================== */
function classify(item){
  if(item.kind==="pharm") return "pharm";
  if(item.div.includes("한")) return "orient"; // 한의원/한방병원
  return "hosp";
}
function bigRank(item){
  const order=["상급종합","종합병원","한방병원","병원","요양병원","치과병원"];
  for(let i=0;i<order.length;i++){ if(item.div.includes(order[i]) && !item.div.includes("의원")) return i; }
  return 99;
}

function render(){
  const ti = todayInfo();
  const list = $("#list");
  const dutyMode = false;
  $("#dutyBanner").classList.toggle("hidden", TAB!=="pharm");  // 약국 탭에서 주말·공휴일 안내 표시

  // 대상 풀
  let pool = [...DATA.hosp, ...DATA.pharm].map(it=>{
    it.cat = classify(it);
    it.km = haversine(MYLOC, it);
    return it;
  });

  // 탭 필터
  if(TAB==="hosp") pool = pool.filter(i=>i.cat==="hosp");
  else if(TAB==="orient") pool = pool.filter(i=>i.cat==="orient");
  else if(TAB==="pharm") pool = pool.filter(i=>i.cat==="pharm");

  // 선택한 날짜 기준으로 영업 판정
  const days=["일","월","화","수","목","금","토"];
  const curDate = SELDATE || ti.dateStr;
  const di = dateInfo(curDate);
  const evalIdx = di.idx;
  const isToday = (curDate === ti.dateStr);
  const evalLabel = `${di.m}/${di.d}(${days[di.dow]})${di.isHol?" 공휴일":""}`;

  // 영업 판정 (현재 시각 기준)
  pool.forEach(it=>{
    it._st = openState(it, evalIdx, ti.mins);
    it._night = isNight(it, evalIdx);
  });
  if(dutyMode){
    // 당번약국: 토/일/공휴일 중 하나라도 운영시간이 등록된 약국
    pool = pool.filter(i=> i._st.has || openState(i,6,0).has || openState(i,7,0).has || openState(i,8,0).has );
  }else{
    if(FILT.has("open")) pool = pool.filter(i=> i._st.open || i.er );  // 영업중 + 응급실(24시간) 보유 기관 포함
    if(FILT.has("night")) pool = pool.filter(i=> i._night || i.er );
  }

  // 정렬: 큰병원 먼저(옵션) → 거리
  pool.sort((a,b)=>{
    if(FILT.has("big")){
      const ra=bigRank(a), rb=bigRank(b);
      if(ra!==rb) return ra-rb;
    }
    // 지금 영업중인 곳을 위로 (응급실 포함)
    const ao=((a._st&&a._st.open)||a.er)?0:1, bo=((b._st&&b._st.open)||b.er)?0:1;
    if(ao!==bo) return ao-bo;
    return a.km-b.km;
  });

  // 상태줄
  const now = ti.kst;
  const hh=String(now.getHours()).padStart(2,"0"), mm=String(now.getMinutes()).padStart(2,"0");
  $("#statusLine").innerHTML =
    `<span><span class="dot" style="background:var(--accent)"></span>${MYLOC.real?"현재 위치":"양천구청"} 기준 가까운 순</span>`+
    `<span>기준일: <b style="color:var(--txt)">${dutyMode?"주말·공휴일":evalLabel}</b>${isToday?` · 현재 ${hh}:${mm}`:""}</span>`+
    `<span>${pool.length}곳</span>`+
    (SNAPDATE?`<span class="small">스냅샷 ${SNAPDATE} 기준</span>`:(LASTUP?`<span class="small">데이터 ${new Date(LASTUP).toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})} 기준</span>`:""))+
    (window.SNAP_TSV?`<button class="btn lookup" onclick="render()">🔄 다시 조회</button>`:`<button class="btn lookup" onclick="loadData(true)">🔍 최신 조회</button>`);

  if(pool.length===0){ list.innerHTML='<div class="empty">조건에 맞는 곳이 없습니다. 필터를 조정해 보세요.</div>'; return; }

  // 성능: 가까운 순 상위 LIMIT개만 렌더, 나머지는 '더 보기'
  const shown = pool.slice(0, LIMIT);
  let html="", lastBig=null;
  shown.forEach(it=>{
    if(FILT.has("big") && TAB!=="pharm" && TAB!=="duty"){
      const big = bigRank(it)<99;
      if(big && lastBig!==true){ html+='<div class="grp-h">🏥 큰 병원 (종합·병원급)</div>'; lastBig=true; }
      if(!big && lastBig!==false){ html+='<div class="grp-h">📍 의원·약국·기타 (가까운 순)</div>'; lastBig=false; }
    }
    html += card(it, evalIdx, dutyMode, ti, isToday);
  });
  if(pool.length>LIMIT) html += `<button class="btn" id="moreBtn" style="width:100%;margin-top:8px">더 보기 (+${pool.length-LIMIT}곳)</button>`;
  list.innerHTML = html;
}

function card(it, idx, dutyMode, ti, isToday){
  const big = bigRank(it)<99;
  const st = it._st;
  // 영업 표시
  let openHtml;
  if(st.has){
    const range = `${fmtT(it.t["dutyTime"+idx+"s"])}~${fmtT(it.t["dutyTime"+idx+"c"])}`;
    if(isToday && st.open) openHtml = `<span class="o">● 영업중</span> · ${range}`;
    else if(isToday && !st.open) openHtml = `<span class="x">● 영업종료</span> · ${range}`;
    else openHtml = `운영 ${range}`;
  }else{
    const anyH=[1,2,3,4,5,6,7,8].some(i=>it.t["dutyTime"+i+"s"]);
    openHtml = anyH ? `<span class="x">${isToday?"오늘":"이 날"} 휴무</span>` : `<span class="x">운영시간 정보 없음</span>`;
  }

  // 배지
  let badges="";
  if(big) badges+=`<span class="badge b-big">${it.div||"병원급"}</span>`;
  else if(it.div) badges+=`<span class="badge b-type">${it.div}</span>`;
  if(it.er) badges+=`<span class="badge b-er">응급실</span>`;
  if(st.has && isToday && st.open) badges+=`<span class="badge b-open">지금 영업</span>`;
  else if(st.has && isToday) badges+=`<span class="badge b-closed">영업종료</span>`;
  if(it._night) badges+=`<span class="badge b-night">야간</span>`;

  // 주말 요약(약국/당번 모드)
  let weekend="";
  if(it.kind==="pharm" || dutyMode){
    const sat=openState(it,6,0), sun=openState(it,7,0), hol=openState(it,8,0);
    const parts=[];
    if(sat.has) parts.push(`토 ${fmtT(it.t.dutyTime6s)}~${fmtT(it.t.dutyTime6c)}`);
    if(sun.has) parts.push(`일 ${fmtT(it.t.dutyTime7s)}~${fmtT(it.t.dutyTime7c)}`);
    if(hol.has) parts.push(`공휴일 ${fmtT(it.t.dutyTime8s)}~${fmtT(it.t.dutyTime8c)}`);
    if(parts.length) weekend=`<div class="meta">📅 ${parts.join(" · ")}</div>`;
    else weekend=`<div class="meta">📅 주말·공휴일 미운영(등록 정보 없음)</div>`;
  }

  // 특화 분야 (큰 병원: 전공·수술 아이콘 칩 → 클릭 시 해당 과 의료진 표시)
  let spec="";
  const sp = specialtyOf(it.name);
  if(sp){
    const docLink=sp.docUrl||sp.url;
    const aw=(sp.awards||[]).map(a=>`<span class="award">🏆 ${a}</span>`).join("");
    const live = sp.mokDepts && location.protocol!=="file:";  // 프록시(localhost) 실행 시 실시간 조회
    let chips="";
    if(live){
      chips = sp.mokDepts.map(d=>`<button type="button" class="spec has" data-mok="1" data-cd="${d[1]}" data-grp="${d[2]}" data-dn="${escAttr(d[0])}">🩺 ${d[0]} ▾</button>`).join("");
    } else if(sp.docGroups){
      chips = Object.keys(sp.docGroups).map(dept=>`<button type="button" class="spec has" data-docname="${escAttr(it.name)}" data-dept="${escAttr(dept)}">🩺 ${dept} ▾</button>`).join("");
    } else if(sp.icons){
      chips = sp.icons.map(ic=>`<span class="spec"><span class="i">${ic[0]}</span>${ic[1]}</span>`).join("");
    }
    spec = (chips?`<div class="specs">${chips}</div><div class="docbox"></div>`:"")
      + (sp.asm?`<div class="awards"><span class="award asm">🏅 ${sp.asm}</span></div>`:"")
      + (aw?`<div class="awards">${aw}</div>`:"")
      + `<div class="note"><b>대표 진료</b> ${sp.txt||""}`
      + (docLink?` · <a class="lnk" href="${docLink}" target="_blank">전체 의료진 보기</a>`:"")
      + (sp.url?` · <a class="lnk" href="${sp.url}" target="_blank">홈페이지</a>`:"")
      + `</div>`;
  }

  // 진료과목 (병원만 · 지연 로드, 큰 병원은 자동 표시)
  let deptSection="";
  if(it.kind==="hosp" && it.t.hpid){
    deptSection=`<div class="dept-wrap" data-hpid="${it.t.hpid}" data-name="${escAttr(it.name)}" data-big="${big?1:0}">
      <button class="deptbtn" type="button">🏷️ 진료과목 보기</button>
      <div class="dept-box"></div>
    </div>`;
  }

  // 액션
  const mapQ = encodeURIComponent(it.name+" "+(it.addr||""));
  const acts = `<div class="acts">
    ${it.tel?`<a class="call" href="tel:${it.tel}">📞 ${it.tel}</a>`:""}
    <a href="https://map.kakao.com/?q=${mapQ}" target="_blank">🗺️ 길찾기</a>
  </div>`;

  return `<div class="card ${big?'big':''}">
    <div class="c-top">
      <div>
        <p class="c-name">${it.name}</p>
        <div class="badges">${badges}</div>
      </div>
      <div class="dist"><b>${distLabel(it.km)}</b><br><span class="small">${MYLOC.real?'내 위치':'구청'} 기준</span></div>
    </div>
    <div class="meta">📍 ${it.addr||"주소 정보 없음"}</div>
    <div class="hours">🕒 ${openHtml}</div>
    ${it.er?`<div class="meta" style="color:#c0271f;font-weight:700">🚑 응급실 24시간 운영 (외래는 위 시간 기준)</div>`:""}
    ${weekend}
    ${spec}
    ${deptSection}
    ${acts}
  </div>`;
}

// 진료과목 보기/숨기기 (지연 로드)
$("#list").addEventListener("click", async e=>{
  if(e.target.id==="moreBtn"){ LIMIT+=60; render(); return; }
  // 전공/과 칩 클릭 → 해당 과 의료진 표시 (이대목동은 실시간 조회)
  const sc=e.target.closest(".spec");
  if(sc && (sc.dataset.docname!==undefined || sc.dataset.mok)){
    const card=sc.closest(".card"); const box=card&&card.querySelector(".docbox"); if(!box) return;
    [...card.querySelectorAll(".spec")].forEach(x=>x.classList.remove("on"));
    const keyid = sc.dataset.mok ? ("m"+sc.dataset.cd) : (sc.dataset.dept||"");
    if(box.dataset.open===keyid){ box.innerHTML=""; box.dataset.open=""; return; }
    sc.classList.add("on"); box.dataset.open=keyid;
    if(sc.dataset.mok){   // 이대목동 의료진 (그날 1회만 조회, 이후 캐시)
      const dn=sc.dataset.dn, cd=sc.dataset.cd, grp=sc.dataset.grp;
      const ck="mok_"+cd; let arr=(cacheGet(ck)||{}).v;
      if(!arr){
        box.innerHTML=`<div class="dept-cap">⏳ ${dn} 의료진 불러오는 중…</div>`;
        try{
          const html=await (await fetch(apiRoot()+"/mok/medical/dept/deptDoctor.do?grp_yn="+grp+"&dept_cd="+cd)).text();
          const t=new DOMParser().parseFromString(html,"text/html").body.textContent.replace(/\s+/g," ");
          const re=/([가-힣]{2,5})\s*교수(.*?)진료과(.*?)전문\s*진료\s*분야(.*?)진료예약/g;
          arr=[]; let m;
          while((m=re.exec(t))){const n=m[1].trim(); if(n&&n!=="일반의"&&!arr.some(x=>x.n===n))arr.push({n,t:(m[2]||"").replace(/\s+/g," ").trim()||"교수",f:(m[4]||"").replace(/\s+/g," ").replace(/\.\.\.$/,"").trim()});}
          cacheSet(ck,arr);
        }catch(err){
          box.innerHTML=`<div class="dept-cap">조회 실패 — proxy.py로 실행했는지 확인하세요. <a class="lnk" href="https://mokdong.eumc.ac.kr/medical/dept/deptList.do" target="_blank">병원 의료진 페이지</a></div>`; return;
        }
      }
      box.innerHTML = arr.length
        ? `<div class="dept-cap"><span class="k">👨‍⚕️ ${dn} 의료진</span> · ${arr.length}명 · 사진 제외 · 출처 병원공식</div>`+arr.map(d=>`<div class="doc"><b>${d.n}</b><span class="doct">${d.t}</span><div class="docf">${d.f}</div></div>`).join("")
        : `<div class="dept-cap">의료진 정보를 찾지 못했습니다.</div>`;
      return;
    }
    // 임베디드(docGroups) 표시 — 데모 등
    const name=sc.dataset.docname, dept=sc.dataset.dept||"";
    const sp=specialtyOf(name); const docLink=(sp&&(sp.docUrl||sp.url))||"";
    if(dept && sp && sp.docGroups && sp.docGroups[dept]){
      const arr=sp.docGroups[dept];
      box.innerHTML=`<div class="dept-cap"><span class="k">👨‍⚕️ ${dept} 의료진</span> · ${arr.length}명 · 사진 제외</div>`
        + arr.map(d=>`<div class="doc"><b>${d.n}</b><span class="doct">${d.t||""}</span><div class="docf">${d.f||""}</div></div>`).join("")
        + (docLink?`<div class="small" style="margin-top:6px">전체·최신: <a class="lnk" href="${docLink}" target="_blank">병원 의료진 페이지</a></div>`:"");
    }else{
      box.innerHTML=`<div class="dept-cap">이 분야 의료진 명단은 준비 중이에요.${docLink?` <a class="lnk" href="${docLink}" target="_blank">병원 의료진 페이지에서 보기</a>`:""}</div>`;
    }
    return;
  }
  const btn=e.target.closest(".deptbtn"); if(!btn) return;
  const wrap=btn.closest(".dept-wrap"); if(!wrap) return;
  const box=wrap.querySelector(".dept-box");
  if(wrap.dataset.loaded==="1"){
    box.classList.toggle("hidden");
    btn.textContent = box.classList.contains("hidden") ? "🏷️ 진료과목 보기" : "🏷️ 진료과목 숨기기";
    return;
  }
  btn.textContent="⏳ 진료과목 불러오는 중…";
  const list=await loadDepts(wrap.dataset.hpid);
  box.innerHTML=deptChipsHtml(list, wrap.dataset.name, specialtyOf(wrap.dataset.name));
  wrap.dataset.loaded="1";
  btn.textContent="🏷️ 진료과목 숨기기";
});

$("#useLoc").addEventListener("click",getLoc);
function getLoc(){
  if(!navigator.geolocation) return;   // 미지원 시 양천구청 기준 유지
  navigator.geolocation.getCurrentPosition(
    p=>{ MYLOC={lat:p.coords.latitude,lon:p.coords.longitude,real:true};
         if(DATA.hosp.length||DATA.pharm.length) render(); },
    ()=>{ /* 거부/실패 시 조용히 양천구청 기준 유지 (alert는 화면을 멈춤) */ },
    {enableHighAccuracy:true,timeout:8000}
  );
}

/* ===================== 시계 ===================== */
function tick(){
  const k=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  const days=["일","월","화","수","목","금","토"];
  const ti=todayInfo();
  const hh=String(k.getHours()).padStart(2,"0"),mm=String(k.getMinutes()).padStart(2,"0"),ss=String(k.getSeconds()).padStart(2,"0");
  $("#clock").innerHTML=`<b>${k.getMonth()+1}/${k.getDate()}(${days[k.getDay()]})${ti.isHol?' 🔴공휴일':''}</b> ${hh}:${mm}:${ss}`;
  const el=document.getElementById("nowt"); if(el) el.textContent=`(${hh}:${mm})`;  // '지금 영업중' 옆 현재 시각
}
setInterval(tick,1000); tick();

}
